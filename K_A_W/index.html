<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kareful Adventures Animal Services | San Antonio</title>
    <style>
        :root { 
            --deep-blue: #457b9d; 
            --accent-purple: #6d597a; 
            --nature-green: #2d6a4f; 
            --dark-text: #2b2d42; 
        }
        
        body, html { height: 100%; margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; }

        /* Navigation */
        nav { 
            background: rgba(255,255,255,0.95); 
            padding: 0.5rem 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: fixed; 
            top: 20px; 
            width: 90%; 
            left: 5%; 
            z-index: 1000; 
            border-radius: 50px; 
        }
        .nav-logo { display: flex; align-items: center; text-decoration: none; }
        .nav-logo img { height: 45px; width: auto; margin-right: 12px; border-radius: 50%; }
        .logo-text { font-weight: bold; font-size: 1.1rem; color: var(--deep-blue); }
        .portal-btn { background: var(--accent-purple); color: white; text-decoration: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 0.9rem; }

        /* Full Screen Watercolor Scene */
        .hero-section {
            background-image: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1)), url('hero-bg.jpg');
            height: 100vh; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-size: cover; /* This prevents distortion */
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-align: center;
        }

        .hero-content {
            background: rgba(255, 255, 255, 0.85); 
            padding: 40px; 
            border-radius: 40px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            max-width: 80%;
            backdrop-filter: blur(5px);
        }
        
        .hero-content h1 { font-size: clamp(2rem, 5vw, 3rem); color: var(--deep-blue); margin: 0 0 10px 0; }
        .hero-content p { font-size: 1.2rem; color: #444; margin-bottom: 25px; }

        .btn-main { 
            background: var(--nature-green); 
            color: white; 
            padding: 18px 35px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            display: inline-block; 
            box-shadow: 0 8px 20px rgba(45, 106, 79, 0.3);
        }

        /* Footer & QR Section */
        footer { 
            background: rgba(43, 45, 66, 0.95); 
            color: white; 
            padding: 3rem 20px; 
            text-align: center;
        }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; align-items: center; }
        .qr-code img { width: 120px; background: white; padding: 10px; border-radius: 10px; }
        footer a { color: #a8dadc; text-decoration: none; }

        @media (max-width: 600px) {
            .logo-text { display: none; }
            .hero-content { padding: 25px; width: 90%; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="nav-logo">
        <img src="logo.jpg" alt="Kareful Adventures Logo">
        <div class="logo-text">Kareful Adventures</div>
    </a>
    <a href="https://www.timetopet.com/portal/kyran-prado" class="portal-btn">Client Login</a>
</nav>

<div class="hero-section">
    <div class="hero-content">
        <h1>Reliable Care.<br>Epic Adventures.</h1>
        <p>Serving San Antonio, Cibolo, and surrounding areas.</p>
        <a href="https://www.timetopet.com/portal/kyran-prado/create-account" class="btn-main">Book Your Adventure</a>
    </div>
</div>

<footer>
    <div class="footer-grid">
        <div>
            <h3>Contact Us</h3>
            <p>Phone: 210-693-008</p>
            <p>Email: <a href="mailto:kareful.adventures@gmail.com">kareful.adventures@gmail.com</a></p>
        </div>
        <div class="qr-code">
            <p>Scan to Visit Facebook</p>
            <!-- This generates a real QR code for your FB link -->
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.facebook.com/kareful.adventure/" alt="Facebook QR Code">
        </div>
        <div>
            <p>&copy; 2026 Kareful Adventures Animal Services</p>
            <p>Licensed & Insured</p>
        </div>
    </div>
</footer>

</body>
</html>
